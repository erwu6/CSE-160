<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>My first three.js app</title>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
        }
      }
    </script>
    <style>
      .split {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        display: flex;
      }
      .split>div {
        width: 100%;
        height: 100%;
      }
      body { margin: 0; }
      #loading {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
      }
      #loading .progress {
          margin: 1.5em;
          border: 1px solid white;
          width: 50vw;
      }
      #loading .progressbar {
          margin: 2px;
          background: white;
          height: 1em;
          transform-origin: top left;
          transform: scaleX(0);
      }
      #c {
        width: 100vw;
        height: 100vh;
        display: block;
        /* background: url(lib/brown_photostudio_03_4k.exr) no-repeat center center;
        background-size: cover; */
      }
    </style>
  </head>
  <body>
    <script type="module" src="main.js"></script>
    <canvas id="c"></canvas>
    <div class="split">
     <div id="view1" tabindex="1"></div>
     <div id="view2" tabindex="2"></div>
    </div>
    <div id="loading">
    <div class="progress"><div class="progressbar"></div></div>
  </div>
  </body>
</html>
